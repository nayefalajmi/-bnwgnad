<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="بن وقناد — متجر القهوة والشاي الكويتي. أجود أنواع البن والشاي والهيل والزعفران. توصيل للكويت." />
  <meta property="og:title"       content="بن وقناد | متجر القهوة والشاي" />
  <meta property="og:description" content="أجود أنواع البن والشاي والهيل والزعفران — توصيل للكويت" />
  <meta property="og:image"       content="https://bnwgnad.com/logo.png" />
  <meta property="og:url"         content="https://bnwgnad.com" />
  <meta property="og:type"        content="website" />
  <title>بن وقناد | متجر القهوة والشاي</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ══ NAVBAR ══ -->
<header class="navbar">
  <a href="index.html" class="navbar-brand">
    <img src="logo.png" alt="بن وقناد" class="logo-img"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
    <div class="brand-text">
      <span class="brand-name">بن وقناد</span>
      <span class="brand-since">منذ ٢٠٢٠</span>
    </div>
  </a>
  <div class="navbar-actions">
    <a href="admin.html">لوحة التحكم</a>
    <button class="cart-btn" onclick="openCart()">
      🛒 السلة
      <span class="cart-count" id="cartCount" style="display:none">0</span>
    </button>
  </div>
</header>

<!-- ══ HERO ══ -->
<section class="hero">
  <h1>☕ بن وقناد</h1>
</section>

<!-- ══ FILTERS ══ -->
<div class="filters" id="filters">
  <button class="filter-btn active" data-cat="all">الكل</button>
</div>

<!-- ══ PRODUCTS ══ -->
<section class="products-section">
  <h2 class="section-title">🛍 المنتجات</h2>
  <div class="products-grid" id="productsGrid">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>جاري تحميل المنتجات…</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 بن وقناد — جميع الحقوق محفوظة</p>
</footer>

<!-- ══ CART SIDEBAR ══ -->
<div class="cart-overlay" id="cartOverlay" onclick="handleCartOverlayClick(event)">
  <aside class="cart-sidebar">
    <div class="cart-header">
      <h3>🛒 سلة المشتريات</h3>
      <button class="cart-close-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">السلة فارغة</div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total">
        <span>المجموع:</span>
        <span id="cartTotal">0.00 د.ك</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn" onclick="startCheckout()">إتمام الطلب ✓</button>
    </div>
  </aside>
</div>

<!-- ══ ADDRESS MODAL ══ -->
<div class="modal-overlay" id="addressOverlay" onclick="if(event.target===this)closeAddress()">
  <div class="modal" style="max-width:520px">
    <h3 class="modal-title">📦 عنوان التوصيل</h3>

    <div class="addr-form">
      <div class="addr-row">
        <div class="form-group">
          <label>الاسم الكامل *</label>
          <input type="text" id="aName" placeholder="محمد العلي" />
        </div>
        <div class="form-group">
          <label>رقم الهاتف *</label>
          <input type="tel" id="aPhone" placeholder="965XXXXXXXX+" dir="ltr" />
        </div>
      </div>
      <div class="addr-row">
        <div class="form-group">
          <label>المنطقة *</label>
          <input type="text" id="aArea" placeholder="السالمية، حولي…" />
        </div>
        <div class="form-group">
          <label>الشارع *</label>
          <input type="text" id="aStreet" placeholder="شارع الخليج" />
        </div>
      </div>
      <div class="addr-row">
        <div class="form-group">
          <label>رقم المنزل / البناية *</label>
          <input type="text" id="aBuilding" placeholder="١٢" />
        </div>
        <div class="form-group">
          <label>رقم الشقة</label>
          <input type="text" id="aFlat" placeholder="اختياري" />
        </div>
      </div>
      <div class="form-group">
        <label>ملاحظات</label>
        <textarea id="aNotes" rows="2" placeholder="أي تعليمات إضافية للتوصيل…"></textarea>
      </div>
    </div>

    <!-- Order summary inside modal -->
    <div class="addr-summary" id="addrSummary"></div>

    <!-- Payment method -->
    <div class="form-group" style="margin-top:1rem">
      <label>طريقة الدفع *</label>
      <div class="pay-method-row">
        <button class="pay-method-btn active" id="pmCard" onclick="selectPayMethod('card')">
          💳 دفع بالبطاقة
        </button>
        <button class="pay-method-btn" id="pmCash" onclick="selectPayMethod('cash')">
          💵 كاش عند الاستلام
        </button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-accent" id="payBtn" onclick="submitAddress()">الدفع بالبطاقة ←</button>
      <button class="btn btn-outline" onclick="closeAddress()">رجوع</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="js/config.js"></script>
<script src="js/analytics.js"></script>
<script>
/* ─── Hesabe (client-side) ─── */
const HB_MERCHANT = '47340922';
const HB_ACCESS   = '15dc3bd9-33b3-406c-b13b-edb3d056bc30';
const HB_SECRET   = 'XZx9dzjrPM748jYRd9MopOkbVYyBALGR';
const HB_IV       = 'PM748jYRd9MopOkb';
const HB_URL      = 'https://checkout.hesabe.com/payment';

function hesabeEncrypt(text) {
  const key = CryptoJS.enc.Utf8.parse(HB_SECRET);
  const iv  = CryptoJS.enc.Utf8.parse(HB_IV);
  return CryptoJS.AES.encrypt(text, key, {
    iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
  }).toString();
}

/* ─── Icons ─── */
const ICONS = {
  'قهوة':'☕','شاي':'🍵','بن':'🫘','هيل':'🌿',
  'زعفران':'🌸','عطر':'🌺','توابل':'🌶️','أخرى':'🛍'
};
function getIcon(name, cat) {
  for (const [k, v] of Object.entries(ICONS))
    if (name.includes(k) || (cat||'').includes(k)) return v;
  return '🛍';
}

/* ─── State ─── */
let allProducts = [];
let cart = JSON.parse(localStorage.getItem('bnwgnad_cart') || '[]');

/* ════════════════════════════
   PRODUCTS
════════════════════════════ */
async function loadProducts() {
  const { data, error } = await supabase
    .from('products').select('*').eq('Available', true).order('Name');
  const grid = document.getElementById('productsGrid');
  if (error) {
    grid.innerHTML = '<div class="empty-state"><p>حدث خطأ أثناء تحميل المنتجات</p></div>';
    return;
  }
  allProducts = data;
  buildFilters(data);
  renderProducts(data);
}

function buildFilters(data) {
  const el = document.getElementById('filters');
  const cats = ['all', ...new Set(data.map(p => p.Category).filter(Boolean))];
  el.innerHTML = cats.map(c =>
    `<button class="filter-btn ${c==='all'?'active':''}" data-cat="${c}">${c==='all'?'الكل':c}</button>`
  ).join('');
  el.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.cat;
      renderProducts(cat==='all' ? allProducts : allProducts.filter(p => p.Category===cat));
    });
  });
}

function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><p>لا توجد منتجات في هذه الفئة</p></div>';
    return;
  }
  grid.innerHTML = list.map(p => {
    const price = parseFloat(p.Price||0).toFixed(2);
    const imgHtml = p.image_url
      ? `<img src="${p.image_url}" alt="${p.Name}" loading="lazy" />`
      : `<span class="product-icon-fallback">${getIcon(p.Name, p.Category)}</span>`;
    return `
    <div class="product-card" id="card-${p.id}">
      <div class="product-img-wrap">${imgHtml}</div>
      <h3>${p.Name}</h3>
      <p class="category">${p.Category||''}</p>
      ${p.Description ? `<p class="description">${p.Description}</p>` : ''}
      <div class="price-row">
        <p class="price">${price} <span>د.ك</span></p>
        <div class="card-qty-ctrl" id="cardqty-${p.id}">${cardQtyHtml(p.id)}</div>
      </div>
    </div>`;
  }).join('');
}

/* Returns the correct HTML for a card's qty control */
function cardQtyHtml(id) {
  const item = cart.find(c => c.id === id);
  if (!item) {
    return `<button class="add-btn" onclick="cardAdd(${id})">＋ أضف</button>`;
  }
  return `
    <div class="card-qty-inline">
      <button class="cq-btn" onclick="cardDec(${id})">−</button>
      <span class="cq-num">${item.qty}</span>
      <button class="cq-btn" onclick="cardInc(${id})">＋</button>
    </div>`;
}

/* Update only the qty-ctrl area of one card (no full re-render) */
function refreshCardQty(id) {
  const el = document.getElementById(`cardqty-${id}`);
  if (el) el.innerHTML = cardQtyHtml(id);
}

function cardAdd(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const price = parseFloat(p.Price||0);
  cart.push({ id: p.id, name: p.Name, price, image: p.image_url || null, icon: getIcon(p.Name, p.Category), qty: 1 });
  saveCart();
  refreshCardQty(id);
  renderCartItems();
  trackAddToCart({ id: p.id, name: p.Name, price });
}

function cardInc(id) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty++;
  saveCart();
  refreshCardQty(id);
  renderCartItems();
}

function cardDec(id) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty--;
  if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
  saveCart();
  refreshCardQty(id);
  renderCartItems();
}

/* ════════════════════════════
   CART
════════════════════════════ */
function saveCart() {
  localStorage.setItem('bnwgnad_cart', JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cartCount');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

/* qty changes from inside the sidebar */
function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
  saveCart();
  refreshCardQty(id);
  renderCartItems();
}
function removeFromCart(id) { changeQty(id, -999); }

function renderCartItems() {
  const el     = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if (!cart.length) {
    el.innerHTML = '<div class="cart-empty">🛒<br><br>السلة فارغة</div>';
    footer.style.display = 'none';
    return;
  }
  el.innerHTML = cart.map(item => {
    const imgHtml = item.image ? `<img src="${item.image}" alt="${item.name}" />` : item.icon;
    return `
    <div class="cart-item">
      <div class="cart-item-img">${imgHtml}</div>
      <div class="cart-item-info">
        <h4>${item.name}</h4>
        <p class="item-price">${(item.price * item.qty).toFixed(2)} د.ك</p>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id}, 1)">＋</button>
      </div>
      <button class="cart-item-remove" onclick="removeFromCart(${item.id})" title="حذف">✕</button>
    </div>`;
  }).join('');
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cartTotal').textContent = `${total.toFixed(2)} د.ك`;
  footer.style.display = 'block';
}

function openCart() {
  renderCartItems();
  document.getElementById('cartOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleCartOverlayClick(e) {
  if (e.target === document.getElementById('cartOverlay')) closeCart();
}

/* ════════════════════════════
   ADDRESS MODAL
════════════════════════════ */
/* ─── Payment method ─── */
let selectedPayMethod = 'card';

function selectPayMethod(method) {
  selectedPayMethod = method;
  document.getElementById('pmCard').classList.toggle('active', method === 'card');
  document.getElementById('pmCash').classList.toggle('active', method === 'cash');
  document.getElementById('payBtn').textContent =
    method === 'card' ? 'الدفع بالبطاقة ←' : 'تأكيد الطلب ✓';
}

function startCheckout() {
  if (!cart.length) return;

  /* Build order summary */
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const summaryHtml = `
    <div class="addr-summary-box">
      <p class="addr-summary-title">ملخص الطلب</p>
      ${cart.map(i =>
        `<div class="addr-summary-row">
          <span>${i.name} × ${i.qty}</span>
          <span>${(i.price * i.qty).toFixed(2)} د.ك</span>
        </div>`
      ).join('')}
      <div class="addr-summary-total">
        <span>المجموع</span>
        <span>${total.toFixed(2)} د.ك</span>
      </div>
    </div>`;
  document.getElementById('addrSummary').innerHTML = summaryHtml;

  /* Reset pay button & method */
  selectedPayMethod = 'card';
  selectPayMethod('card');
  const btn = document.getElementById('payBtn');
  btn.disabled = false;

  closeCart();
  document.getElementById('addressOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  trackBeginCheckout(total, cart);
}

function closeAddress() {
  document.getElementById('addressOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

async function submitAddress() {
  const name     = document.getElementById('aName').value.trim();
  const phone    = document.getElementById('aPhone').value.trim();
  const area     = document.getElementById('aArea').value.trim();
  const street   = document.getElementById('aStreet').value.trim();
  const building = document.getElementById('aBuilding').value.trim();
  const flat     = document.getElementById('aFlat').value.trim();
  const notes    = document.getElementById('aNotes').value.trim();

  if (!name || !phone || !area || !street || !building) {
    showToast('⚠️ يرجى ملء جميع الحقول المطلوبة', 'error');
    return;
  }

  const btn = document.getElementById('payBtn');
  btn.disabled = true;

  const total    = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const orderRef = 'ORD-' + Date.now();
  const address  = `${area}، ${street}، ${building}${flat ? ' ش'+flat : ''}`;

  /* ── كاش: أكّد الطلب مباشرة ── */
  if (selectedPayMethod === 'cash') {
    btn.textContent = '⏳ جاري التأكيد…';
    try {
      await supabase.from('orders').insert([{
        order_ref:      orderRef,
        customer_name:  name,
        customer_phone: phone,
        address:        address,
        notes:          notes || null,
        items:          cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
        total:          parseFloat(total.toFixed(3)),
        payment_method: 'cash',
        status:         'new'
      }]);
    } catch(e) { console.warn('Order save failed:', e); }
    const params = new URLSearchParams({ ref: orderRef, amount: total.toFixed(3), method: 'cash' });
    localStorage.removeItem('bnwgnad_cart');
    window.location.href = `/payment-success.html?${params}`;
    return;
  }

  /* ── بطاقة: form submit مباشر لـ Hesabe (بدون fetch / بدون CORS) ── */
  btn.textContent = '⏳ جاري التوجيه…';

  /* حفظ الطلب في Supabase */
  try {
    await supabase.from('orders').insert([{
      order_ref:      orderRef,
      customer_name:  name,
      customer_phone: phone,
      address:        address,
      notes:          notes || null,
      items:          cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
      total:          parseFloat(total.toFixed(3)),
      payment_method: 'card',
      status:         'pending_payment',
    }]);
  } catch(e) { console.warn('Order save:', e); }

  /* تشفير بيانات الدفع */
  const paymentData = {
    merchantCode:         HB_MERCHANT,
    amount:               total.toFixed(3),
    paymentType:          0,
    responseUrl:          `${location.origin}/api/payment-callback`,
    failureUrl:           `${location.origin}/payment-failed.html`,
    version:              '2.0',
    orderReferenceNumber: orderRef,
    variable1:            name,
    variable2:            phone,
    variable3:            address,
    variable4:            '',
    variable5:            '',
  };
  const encrypted = hesabeEncrypt(JSON.stringify(paymentData));

  /* إنشاء form مخفي وإرسالها — بدون fetch وبدون CORS */
  localStorage.removeItem('bnwgnad_cart');
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = HB_URL;
  form.style.display = 'none';
  [['data', encrypted], ['accessCode', HB_ACCESS]].forEach(([n, v]) => {
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = n; inp.value = v;
    form.appendChild(inp);
  });
  document.body.appendChild(form);
  form.submit();
}

/* ─── Toast ─── */
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ─── Init ─── */
updateCartCount();
loadProducts();
</script>
</body>
</html>
