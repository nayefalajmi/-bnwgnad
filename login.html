<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>تسجيل الدخول | لوحة تحكم بن وقناد</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
    }
    .login-card {
      background: #fff;
      border-radius: 18px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 16px 60px rgba(0,0,0,.32);
    }
    .login-logo { width: 76px; height: 76px; object-fit: contain; display: block; margin: 0 auto .6rem; }
    .login-card h1 { color: var(--primary); font-size: 1.45rem; margin-bottom: .2rem; }
    .login-sub { color: var(--text-muted); font-size: .9rem; margin-bottom: 1.6rem; }
    .login-card input {
      width: 100%;
      padding: .82rem 1rem;
      margin-bottom: .8rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: .95rem;
      box-sizing: border-box;
    }
    .login-card input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,124,26,.15); }
    .login-btn {
      width: 100%;
      padding: .85rem;
      margin-top: .3rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .login-btn:hover { background: var(--accent-light); }
    .login-btn:disabled { opacity: .6; cursor: default; }
    .login-msg { min-height: 1.35rem; font-size: .88rem; margin-bottom: .5rem; line-height: 1.4; }
    .login-msg.err { color: var(--danger); }
    .login-msg.ok  { color: var(--success); }
    .forgot { display: inline-block; margin-top: 1.1rem; color: var(--text-muted); font-size: .85rem; cursor: pointer; text-decoration: underline; background: none; border: none; font-family: inherit; }
    .forgot:hover { color: var(--accent); }
  </style>
</head>
<body>

  <form class="login-card" id="loginForm">
    <img src="logo.png" alt="بن وقناد" class="login-logo" onerror="this.style.display='none'" />
    <h1>لوحة تحكم بن وقناد</h1>
    <p class="login-sub">سجّل الدخول للمتابعة</p>

    <input type="email"    id="email"    placeholder="الإيميل"       autocomplete="username" required />
    <input type="password" id="password" placeholder="كلمة المرور"   autocomplete="current-password" required />
    <div class="login-msg" id="msg"></div>
    <button type="submit" class="login-btn" id="loginBtn">دخول</button>
    <br />
    <button type="button" class="forgot" id="forgotBtn">نسيت كلمة المرور؟</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script>
    const msg = document.getElementById('msg');
    const btn = document.getElementById('loginBtn');
    function show(text, ok) { msg.textContent = text; msg.className = 'login-msg ' + (ok ? 'ok' : 'err'); }

    /* لو فيه جلسة فعّالة مسبقاً، روح للوحة مباشرة */
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) window.location.replace('admin.html');
    })();

    /* تسجيل الدخول */
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { show('الرجاء إدخال الإيميل وكلمة المرور'); return; }

      btn.disabled = true; btn.textContent = '⏳ جاري الدخول…'; show('', true);
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        show('الإيميل أو كلمة المرور غير صحيحة');
        btn.disabled = false; btn.textContent = 'دخول';
        return;
      }
      window.location.replace('admin.html');
    });

    /* نسيت كلمة المرور — إرسال رابط استرجاع للإيميل */
    document.getElementById('forgotBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) { show('اكتب إيميلك في الحقل أعلاه أولاً'); return; }
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: location.origin + '/reset-password.html'
      });
      if (error) show('تعذّر إرسال الرابط: ' + error.message);
      else show('✅ أرسلنا رابط استرجاع كلمة المرور إلى إيميلك. تفقّد بريدك.', true);
    });
  </script>

</body>
</html>
