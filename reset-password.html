<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>كلمة مرور جديدة | بن وقناد</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
    }
    .login-card {
      background: #fff;
      border-radius: 18px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 16px 60px rgba(0,0,0,.32);
    }
    .login-card h1 { color: var(--primary); font-size: 1.45rem; margin-bottom: .2rem; }
    .login-sub { color: var(--text-muted); font-size: .9rem; margin-bottom: 1.6rem; }
    .login-card input {
      width: 100%;
      padding: .82rem 1rem;
      margin-bottom: .8rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: .95rem;
      box-sizing: border-box;
    }
    .login-card input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,124,26,.15); }
    .login-btn {
      width: 100%;
      padding: .85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .login-btn:hover { background: var(--accent-light); }
    .login-btn:disabled { opacity: .6; cursor: default; }
    .login-msg { min-height: 1.35rem; font-size: .88rem; margin-bottom: .5rem; line-height: 1.4; }
    .login-msg.err { color: var(--danger); }
    .login-msg.ok  { color: var(--success); }
  </style>
</head>
<body>

  <form class="login-card" id="resetForm">
    <h1>كلمة مرور جديدة</h1>
    <p class="login-sub">اكتب كلمة المرور الجديدة لحسابك</p>

    <input type="password" id="newPass"  placeholder="كلمة المرور الجديدة"  autocomplete="new-password" minlength="6" required />
    <input type="password" id="newPass2" placeholder="تأكيد كلمة المرور"     autocomplete="new-password" minlength="6" required />
    <div class="login-msg" id="msg"></div>
    <button type="submit" class="login-btn" id="saveBtn">حفظ كلمة المرور</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script>
    const msg = document.getElementById('msg');
    const btn = document.getElementById('saveBtn');
    function show(text, ok) { msg.textContent = text; msg.className = 'login-msg ' + (ok ? 'ok' : 'err'); }

    /* عند فتح الرابط من الإيميل، يقرأ supabase رمز الاسترجاع تلقائياً من الرابط
       وينشئ جلسة مؤقتة (حدث PASSWORD_RECOVERY) تسمح بتغيير كلمة المرور. */
    let canReset = false;
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || session) canReset = true;
    });
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) canReset = true;
    })();

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = document.getElementById('newPass').value;
      const p2 = document.getElementById('newPass2').value;
      if (p1.length < 6) { show('كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }
      if (p1 !== p2)     { show('كلمتا المرور غير متطابقتين'); return; }

      btn.disabled = true; btn.textContent = '⏳ جاري الحفظ…'; show('', true);
      const { error } = await supabase.auth.updateUser({ password: p1 });
      if (error) {
        show('تعذّر تغيير كلمة المرور — قد يكون الرابط منتهياً. اطلب رابطاً جديداً. (' + error.message + ')');
        btn.disabled = false; btn.textContent = 'حفظ كلمة المرور';
        return;
      }
      show('✅ تم تغيير كلمة المرور بنجاح، جارٍ التحويل…', true);
      setTimeout(() => window.location.replace('admin.html'), 1500);
    });
  </script>

</body>
</html>
